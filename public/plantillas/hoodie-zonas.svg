<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">

  <!--
    BUZO CANGURO — Vista Frente
    Proporciones revisadas: cuerpo alto, mangas largas, capucha proporcionada.
    ViewBox 500x580
    Zonas coloreables por ID:
      zona-cuerpo       → torso
      zona-manga-izq    → manga izquierda
      zona-manga-der    → manga derecha
      zona-capucha-ext  → capucha exterior
      zona-capucha-int  → interior / apertura
      zona-bolsillo     → bolsillo canguro
      zona-puño-izq     → puño manga izquierda
      zona-puño-der     → puño manga derecha
      zona-elastico-inf → elástico de cintura
  -->

  <!-- ══ 1. CUERPO ══════════════════════════════════════════ -->
  <path id="zona-cuerpo"
    d="M 88,175
       L 85,505
       L 415,505
       L 412,175
       Z"
    fill="#EBEBEB"
    stroke="#1E1E1E" stroke-width="3" stroke-linejoin="round"/>

  <!-- ══ 2. MANGA IZQUIERDA ═════════════════════════════════ -->
  <!-- Arranca en el hombro izquierdo, baja larga y levemente angosta -->
  <path id="zona-manga-izq"
    d="M 88,175
       C 70,178 40,185 14,192
       L 10,442
       L 84,442
       L 88,195
       Z"
    fill="#EBEBEB"
    stroke="#1E1E1E" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ══ 3. MANGA DERECHA ════════════════════════════════════ -->
  <path id="zona-manga-der"
    d="M 412,175
       C 430,178 460,185 486,192
       L 490,442
       L 416,442
       L 412,195
       Z"
    fill="#EBEBEB"
    stroke="#1E1E1E" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ══ 4. CAPUCHA EXTERIOR ════════════════════════════════ -->
  <path id="zona-capucha-ext"
    d="M 88,175
       C 82,148 80,112 96,76
       C 118,32 182,5 250,5
       C 318,5 382,32 404,76
       C 420,112 418,148 412,175
       Z"
    fill="#EBEBEB"
    stroke="#1E1E1E" stroke-width="3" stroke-linejoin="round"/>

  <!-- ══ 5. CAPUCHA INTERIOR (apertura cara) ════════════════ -->
  <path id="zona-capucha-int"
    d="M 150,175
       C 147,150 151,115 171,88
       C 188,67 220,56 250,56
       C 280,56 312,67 329,88
       C 349,115 353,150 350,175
       Z"
    fill="#D6D6D6"
    stroke="#1E1E1E" stroke-width="2"/>

  <!-- ══ 6. BOLSILLO CANGURO ════════════════════════════════ -->
  <path id="zona-bolsillo"
    d="M 178,322
       L 322,322
       C 324,322 326,324 326,326
       L 328,418
       C 318,428 298,435 250,435
       C 202,435 182,428 172,418
       L 174,326
       C 174,324 176,322 178,322
       Z"
    fill="#E3E3E3"
    stroke="#1E1E1E" stroke-width="1.8"/>

  <!-- ══ 7. PUÑO MANGA IZQUIERDA ════════════════════════════ -->
  <path id="zona-puño-izq"
    d="M 10,442 L 84,442 L 82,478 L 8,478 Z"
    fill="#D2D2D2"
    stroke="#1E1E1E" stroke-width="2" stroke-linejoin="round"/>

  <!-- ══ 8. PUÑO MANGA DERECHA ══════════════════════════════ -->
  <path id="zona-puño-der"
    d="M 416,442 L 490,442 L 492,478 L 418,478 Z"
    fill="#D2D2D2"
    stroke="#1E1E1E" stroke-width="2" stroke-linejoin="round"/>

  <!-- ══ 9. ELÁSTICO INFERIOR ═══════════════════════════════ -->
  <path id="zona-elastico-inf"
    d="M 85,505
       L 415,505
       L 414,545
       C 390,554 340,558 250,558
       C 160,558 110,554 86,545
       Z"
    fill="#D2D2D2"
    stroke="#1E1E1E" stroke-width="2" stroke-linejoin="round"/>

  <!-- ══════════════════════════════════════════════════════
       DETALLES DECORATIVOS — no coloreables
  ══════════════════════════════════════════════════════ -->

  <!-- Costura apertura capucha (puntada interior) -->
  <path d="M 153,175 C 150,151 154,116 174,90 C 191,69 222,58 250,58 C 278,58 309,69 326,90 C 346,116 350,151 347,175"
    fill="none" stroke="#888" stroke-width="1.1" stroke-dasharray="6,4"/>

  <!-- Costura bolsillo (interior) -->
  <path d="M 181,326 L 319,326 L 321,415 C 311,424 295,430 250,430 C 205,430 189,424 179,415 Z"
    fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3.5"/>

  <!-- Costuras elástico inferior: 3 líneas horizontales -->
  <line x1="88"  y1="512" x2="412" y2="512" stroke="#888" stroke-width="1" stroke-dasharray="7,5"/>
  <line x1="88"  y1="520" x2="412" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="7,5"/>
  <line x1="88"  y1="528" x2="412" y2="528" stroke="#888" stroke-width="1" stroke-dasharray="7,5"/>

  <!-- Costuras puño izquierdo: 3 líneas -->
  <line x1="12"  y1="447" x2="82"  y2="447" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="12"  y1="455" x2="82"  y2="455" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="12"  y1="463" x2="82"  y2="463" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Costuras puño derecho: 3 líneas -->
  <line x1="418" y1="447" x2="488" y2="447" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="418" y1="455" x2="488" y2="455" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="418" y1="463" x2="488" y2="463" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Costura hombro izquierdo (set-in sleeve seam) -->
  <line x1="88"  y1="175" x2="14"  y2="192" stroke="#888" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Costura hombro derecho -->
  <line x1="412" y1="175" x2="486" y2="192" stroke="#888" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ══ CORDONES DE CAPUCHA ════════════════════════════════ -->
  <!-- Cord izquierdo desde la base de la apertura -->
  <line x1="180" y1="172" x2="160" y2="235"
    stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cord derecho -->
  <line x1="320" y1="172" x2="340" y2="235"
    stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Aglets (puntas metálicas) -->
  <rect x="154" y="232" width="11" height="18" rx="5"
    fill="#999" stroke="#444" stroke-width="1.2"/>
  <rect x="335" y="232" width="11" height="18" rx="5"
    fill="#999" stroke="#444" stroke-width="1.2"/>

</svg>
